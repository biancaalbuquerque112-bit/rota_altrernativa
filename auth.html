<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Rota Alternativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Header com logo e volta -->
    <header class="auth-header">
        <a href="index.html" class="auth-logo">
            <img class="nav-logo-compass" src="images/image.png" 
            alt="Rota Alternativa" width="40"
                height="40">
            Rota Alternativa
        </a>
        <a href="index.html" class="btn-back">← Voltar</a>
    </header>

    <!-- Container principal -->
    <div class="auth-container">
        <!-- Painel esquerdo - Info -->
        <div class="auth-info">
            <h1>Comece sua <em>jornada</em></h1>
            <p>Junte-se à comunidade de mobilidade solidária e descubra rotas alternativas para sua cidade.</p>

            <div class="info-features">
                <div class="info-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Acesso gratuito</span>
                </div>
                <div class="info-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Rotas inteligentes</span>
                </div>
                <div class="info-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Comunidade ativa</span>
                </div>
                <div class="info-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span>Seguro e privado</span>
                </div>
            </div>
        </div>

        <!-- Painel direito - Formulários -->
        <div class="auth-form-wrapper">
            <!-- Abas -->
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Entrar</button>
                <button class="tab-btn" data-tab="signup">Cadastro</button>
            </div>

            <!-- TAB 1: LOGIN -->
            <form id="loginForm" class="auth-form active" data-tab="login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-remember">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembrar-me neste navegador</label>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>

                <div class="form-footer">
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>
            </form>

            <!-- TAB 2: CADASTRO -->
            <form id="signupForm" class="auth-form" data-tab="signup">
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="emailCadastro">Email</label>
                    <input type="email" id="emailCadastro" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senhaCadastro">Senha</label>
                    <input type="password" id="senhaCadastro" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="confirmaSenha">Confirmar senha</label>
                    <input type="password" id="confirmaSenha" placeholder="••••••••" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefoneCadastro">Telefone</label>
                        <input type="tel" id="telefoneCadastro" placeholder="(00) 00000-0000" required>
                    </div>
                    <div class="form-group">
                        <label for="localizacaoCadastro">Bairro, Cidade – UF</label>
                        <input type="text" id="localizacaoCadastro" placeholder="Ex: Pajuçara, Maceió – AL" required>
                    </div>
                </div>

                <div class="form-terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Criar conta</button>
            </form>

            <!-- Social login -->
            <div class="social-divider">
                <span>ou continue com</span>
            </div>

            <div class="social-buttons">
                <button type="button" class="btn-social" title="Google">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                </button>
                <button type="button" class="btn-social" title="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                </button>
                <button type="button" class="btn-social" title="Apple">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M17.05 13.5c-.91 2.84 2.18 5.33 4.02 5.68.32-.64.56-1.31.56-2.06 0-3.63-2.95-6.63-6.59-6.63-.72 0-1.42.13-2.07.37 1.2 1.28 1.95 3.02 1.95 4.95 0 1.32-.36 2.56-.99 3.63 1.62.45 3.12 1.17 4.12 2.06zm-9.05-1.5c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Decoração de fundo (leve) -->
    <div class="auth-background"></div>

    <script src="auth.js"></script>
</body>

</html>
